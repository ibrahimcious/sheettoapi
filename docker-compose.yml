services:
  app:
    image: ghcr.io/ibrahimcious/sheettoapi:latest
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: tanstack
      POSTGRES_PASSWORD: tanstack
      POSTGRES_DB: tanstack
    ports:
      - "5432:5432"
    volumes:
      - ./.data:/var/lib/postgresql/data
